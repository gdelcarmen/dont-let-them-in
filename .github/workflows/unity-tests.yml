name: Unity Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Detect Unity license configuration
        id: license
        run: |
          if [ -n "${{ secrets.UNITY_LICENSE }}" ] || [ -n "${{ secrets.UNITY_SERIAL }}" ]; then
            echo "has_license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_license=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip tests when no Unity license secrets are set
        if: steps.license.outputs.has_license != 'true'
        run: |
          echo "UNITY_LICENSE/UNITY_SERIAL not configured."
          echo "Skipping Unity test run. Configure Unity secrets to enable this job."

      - name: Run EditMode and PlayMode tests
        if: steps.license.outputs.has_license == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          unityVersion: 2022.3.62f1
          projectPath: .
          testMode: all

      - name: Upload test artifacts
        if: always() && steps.license.outputs.has_license == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts
