name: Unity Build Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build StandaloneOSX proxy artifact
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 2022.3.62f1
          targetPlatform: StandaloneOSX
          projectPath: .
          buildMethod: DontLetThemIn.Utils.Editor.CIBuild.BuildStandaloneOSX

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: standalone-osx-build
          path: Builds/StandaloneOSX
